<input autofocus="" class="flex-1 bg-transparent border-none focus:ring-0 text-lg text-[#1c1917] placeholder:text-[#5f6b66]/60" placeholder="Pregunta a Leadiva" type="text"/>
<div class="flex items-center gap-2">

</div>
</div>
</div>
<!-- Suggestion Chips / Quick Actions -->
</div>
<!-- Decorative Subtle Pattern or Atmosphere -->
</main>
<script>
        // Simple Interaction: Focus search bar on '/' key press
        document.addEventListener('keydown', (e) => {
            if (e.key === '/') {
                e.preventDefault();
                document.querySelector('input').focus();
            }
        });

        // Search Input Glow Effect on Typing
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput.parentElement;

        searchInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                searchContainer.classList.add('border-[#05aba9]');
            } else {
                searchContainer.classList.remove('border-[#05aba9]');
            }
        });
    </script>
